name: ai_exam_evaluation
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  intl: ^0.20.2
  provider: ^6.1.5+1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  flutter_pdfview: ^1.4.4
  syncfusion_flutter_pdfviewer: ^33.1.49
  path_provider: ^2.1.5
  supabase_flutter: ^2.5.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.6             # PPTX/DOCX browser mein kholne ke liye
  dio: ^5.4.3                      # File download ke liye
  open_filex: ^4.3.4               # Downloaded file open karne ke liye
  lottie: ^3.1.2                   # Human animated icons
  wakelock_plus: ^1.2.8            # Prevent screen sleep during quiz
  googleapis_auth: ^1.4.1          # For generating FCM v1 OAuth token
  timezone: ^0.9.4                 # For scheduling local notifications at specific times

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/nsct/
    - assets/lottie/

# Simple icon configuration (adaptive_icon_foreground hata diya)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true